<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sahil Al Nojoom · Dispatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0c12;--bg2:#0f1118;--panel:#14161f;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.13);--txt:#eef0f6;--mut:#9aa0b4;--dim:#646b80;--acc:#7c6cff;--acc2:#9d7bff;--disp:'Plus Jakarta Sans',sans-serif;--body:'Inter',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:var(--body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;text-align:center}
.mk{width:74px;height:74px;border-radius:20px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:grid;place-items:center;box-shadow:0 18px 40px -12px rgba(124,108,255,.6);margin-bottom:22px}
.mk svg{width:40px;height:40px;color:#fff}
h1{font:800 27px/1.2 var(--disp)}h1 span{color:var(--acc2)}
.sub{font:500 14px/1.5 var(--body);color:var(--mut);margin:10px 0 32px}
.cards{display:grid;gap:14px;width:100%;max-width:380px}
a.card{display:flex;align-items:center;gap:14px;text-decoration:none;background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:18px 18px;color:var(--txt);transition:.15s}
a.card:hover{border-color:var(--acc);transform:translateY(-2px)}
a.card .ic{width:46px;height:46px;border-radius:12px;background:rgba(124,108,255,.14);color:var(--acc2);display:grid;place-items:center;flex:0 0 auto}
a.card .ic svg{width:24px;height:24px}
a.card .t{text-align:start;flex:1}
a.card .t b{font:700 16px/1 var(--disp)}a.card .t span{display:block;font:500 12px/1.4 var(--body);color:var(--dim);margin-top:5px}
a.card .ar{color:var(--dim);font-size:20px}
.foot{margin-top:30px;font:600 12px/1.5 var(--body);color:var(--dim)}
</style>
</head>
<body>
  <span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7M5.5 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM18.5 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg></span>
  <h1>Sahil Al Nojoom <span>Dispatch</span></h1>
  <div class="sub">Choose your app</div>
  <div class="cards">
    <a class="card" href="driver/">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>
      <span class="t"><b>Driver App</b><span>Accept trips, update status</span></span><span class="ar">›</span>
    </a>
    <a class="card" href="company/">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-3"/></svg></span>
      <span class="t"><b>Company App</b><span>Confirm orders, track status</span></span><span class="ar">›</span>
    </a>
    <a class="card" href="admin/">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></span>
      <span class="t"><b>Admin Panel</b><span>Office · manage everything</span></span><span class="ar">›</span>
    </a>
  </div>
  <div class="foot">Sahil Al Nojoom · Transport Dispatch</div>
</body>
</html>
